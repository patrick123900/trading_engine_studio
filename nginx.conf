server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location /api/yahoo/ {
    proxy_pass https://query1.finance.yahoo.com/;
    proxy_set_header Host query1.finance.yahoo.com;
    proxy_set_header User-Agent "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36";
    proxy_set_header Accept "application/json,text/plain,*/*";
    proxy_ssl_server_name on;
  }
}
